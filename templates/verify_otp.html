{% extends "base.html" %}

{% block title %}Verify OTP - Login{% endblock %}

{% block extra_css %}
<style>
    .otp-container {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 24px 0;
    }

    .otp-input {
        width: 50px;
        height: 50px;
        border: 2px solid rgba(59, 130, 246, 0.3);
        border-radius: 10px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        color: #60a5fa;
        background: rgba(17, 24, 39, 0.9);
        transition: all 0.3s ease;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .otp-input:focus {
        border-color: #3b82f6;
        background: rgba(17, 24, 39, 1);
        box-shadow: 
            inset 0 1px 2px rgba(0, 0, 0, 0.3),
            0 0 12px rgba(59, 130, 246, 0.4);
        outline: none;
        transform: translateY(-2px);
    }

    .timer-text {
        font-size: 14px;
        color: #f87171;
        text-align: center;
        margin: 16px 0;
        font-weight: 700;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        padding: 12px;
        border-radius: 10px;
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
    }
</style>
{% endblock %}

{% block content %}
<div class="brand-header">
    <div class="brand-icon">📧</div>
    <div class="brand-name">NexAuth</div>
    <div class="brand-tag">Verify OTP</div>
</div>

<div class="auth-card">
    <h1>Enter Verification Code</h1>
    <p>We sent a 6-digit code to <strong>{{ email }}</strong></p>

    <div class="timer-text" id="timerText">⏱️ OTP expires in 10:00</div>

    <form method="POST">
        <input type="hidden" name="email" value="{{ email }}">
        
        <div class="form-group">
            <label>Enter 6-Digit OTP</label>
            <input 
                type="text" 
                name="otp" 
                placeholder="000000" 
                maxlength="6" 
                required
                pattern="[0-9]{6}"
                style="text-align: center; font-size: 24px; letter-spacing: 10px;"
            >
        </div>

        <button type="submit" class="btn">✓ Verify & Login</button>
    </form>

    <div class="form-link" style="margin-top: 30px;">
        <a href="{{ url_for('login') }}">← Back to Login</a> · 
        <a href="{{ url_for('login') }}">Request New OTP</a>
    </div>
</div>

<script>
// Timer countdown
let timeLeft = 600; // 10 minutes in seconds

function updateTimer() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    
    document.getElementById('timerText').textContent = 
        `⏱️ OTP expires in ${minutes}:${seconds.toString().padStart(2, '0')}`;
    
    if (timeLeft > 0) {
        timeLeft--;
        setTimeout(updateTimer, 1000);
    } else {
        document.getElementById('timerText').innerHTML = 
            '❌ OTP expired. <a href="{{ url_for("login") }}">Request new OTP</a>';
    }
}

updateTimer();

// Auto-focus to OTP input
document.querySelector('input[name="otp"]').focus();
</script>
{% endblock %}
